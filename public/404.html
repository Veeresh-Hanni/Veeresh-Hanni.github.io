<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Page Not Found</title>
    <script>
        // Redirect GitHub Pages 404s to the SPA entry point while preserving
        // the original path so BrowserRouter can render the correct screen.
        (function () {
            var path = window.location.pathname || '/';
            var search = window.location.search || '';
            var hash = window.location.hash || '';
            var redirect = path + search + hash;
            window.location.replace('/?p=' + encodeURIComponent(redirect));
        })();
    </script>
</head>

<body>
    <p>Redirecting to home...</p>
</body>

</html>
