<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Page Not Found</title>
    <script>
        // Send unknown routes back through HashRouter so the SPA can render
        // either the matching page or the React-level 404 screen.
        (function () {
            var path = window.location.pathname || '/';
            var search = window.location.search || '';
            var hash = window.location.hash || '';

            if (path === '/' || path === '') {
                window.location.replace('/#/');
                return;
            }

            window.location.replace('/#' + path + search + hash);
        })();
    </script>
</head>

<body>
    <p>Redirecting to home...</p>
</body>

</html>
